name: Publish to NuGet

# DEPRECATED: Atis.DependencyInjection has moved to Atzonix.DependencyInjection
# (https://github.com/atzonix/atzonix-dependency-injection). Automatic publishing is
# DISABLED to prevent any accidental push of the retired package to NuGet. The automatic
# tag trigger below is intentionally commented out; this workflow can only be started
# manually via workflow_dispatch if it is ever genuinely needed.
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.1.0, v2.0.0, etc.

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      # Strip the leading "v" from the tag to get a clean semver
      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (gate before pack)
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: >
          dotnet pack src/Atis.DependencyInjection/Atis.DependencyInjection.csproj
          --no-build
          --configuration Release
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols (.snupkg)
        run: >
          dotnet nuget push "artifacts/*.snupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate